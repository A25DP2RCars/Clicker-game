<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Core Clicker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<div id="game">

    <div id="left">

        <h1>GALAXY CORE</h1>

        <div id="planet-container">
            <div id="planet"></div>
        </div>

        <h2 id="energy">⚡ Enerģija: 0</h2>

        <h3 id="perSecond">+0/sec</h3>

    </div>

    <div id="right">

        <h2>SHOP</h2>

        <button onclick="buyItem('drone')">
            🤖 Drone
            <span>+1/sec</span>
            <b id="droneCost">10</b>
        </button>

        <button onclick="buyItem('miner')">
            ⛏️ Miner
            <span>+5/sec</span>
            <b id="minerCost">50</b>
        </button>

        <button onclick="buyItem('factory')">
            🏭 Factory
            <span>+20/sec</span>
            <b id="factoryCost">250</b>
        </button>

        <button onclick="buyItem('reactor')">
            ☢️ Reactor
            <span>+100/sec</span>
            <b id="reactorCost">1000</b>
        </button>

        <button onclick="buyItem('ai')">
            🧠 AI Core
            <span>+500/sec</span>
            <b id="aiCost">5000</b>
        </button>

        <button onclick="buyItem('galaxy')">
            🌌 Galaxy Engine
            <span>+2500/sec</span>
            <b id="galaxyCost">25000</b>
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
